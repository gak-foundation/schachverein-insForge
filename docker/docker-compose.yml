version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: schachverein-db
    environment:
      POSTGRES_USER: schachverein
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      POSTGRES_DB: schachverein
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schachverein"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: schachverein-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage for PGN, documents, photos)
  minio:
    image: minio/minio:latest
    container_name: schachverein-storage
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-CHANGE_ME_IN_PRODUCTION_MIN_8_CHARS}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # bbpPairings - Swiss system pairing engine
  bbpPairings:
    image: ghcr.io/bieremaboyzprogramming/bbppairings:latest
    container_name: schachverein-pairings
    volumes:
      - ./trf-data:/data
    command: ["bbpPairings", "--help"]
    profiles:
      - pairings
    # Usage: docker compose --profile pairings run --rm bbpPairings bbpPairings --dutch /data/input.trf -o /data/output.trf

volumes:
  postgres_data:
  redis_data:
  minio_data:
