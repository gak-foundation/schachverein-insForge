version: "3.9"

services:
  migrator:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: schachverein-migrator
    command: ["node", "dist-migrate/migrate.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://schachverein:${POSTGRES_PASSWORD}@postgres:5432/schachverein
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: schachverein-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://schachverein:${POSTGRES_PASSWORD}@postgres:5432/schachverein
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      - S3_BUCKET=${S3_BUCKET:-schachverein}
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: schachverein-worker
    restart: always
    command: ["node", "dist-worker/worker.js"]
    environment:
      - NODE_ENV=production
      - IS_WORKER=true
      - DATABASE_URL=postgres://schachverein:${POSTGRES_PASSWORD}@postgres:5432/schachverein
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: schachverein-db
    restart: always
    environment:
      POSTGRES_USER: schachverein
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      POSTGRES_DB: schachverein
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schachverein"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: schachverein-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_ME_IN_PRODUCTION}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage for documents, protocols, photos)
  minio:
    image: minio/minio:latest
    container_name: schachverein-storage
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-CHANGE_ME_IN_PRODUCTION_MIN_8_CHARS}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # bbpPairings - Swiss system pairing engine
  bbpPairings:
    image: ghcr.io/bieremaboyzprogramming/bbppairings:latest
    container_name: schachverein-pairings
    volumes:
      - ./trf-data:/data
    command: ["bbpPairings", "--help"]
    profiles:
      - pairings

volumes:
  postgres_data:
  redis_data:
  minio_data:
