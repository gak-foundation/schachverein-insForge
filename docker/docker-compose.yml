version: "3.9"

# Redis für BullMQ (Background Jobs)
# PostgreSQL wird ausschließlich über Supabase Cloud genutzt

services:
  redis:
    image: redis:7-alpine
    container_name: schachverein-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-schachverein}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
