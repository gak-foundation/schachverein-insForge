name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      NEXT_PUBLIC_SUPABASE_URL: https://ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
      SUPABASE_SERVICE_ROLE_KEY: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_DOMAIN: localhost:3000
      NEXT_PUBLIC_ROOT_DOMAIN: localhost:3000
      ENCRYPTION_KEY: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test:ci

      - run: npm run build
